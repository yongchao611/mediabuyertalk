backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: 'public/images'
public_folder: '/images'

locale: 'zh_Hans'

collections:
  - name: 'beginner'
    label: '🎓 新手入门'
    label_singular: '文章'
    folder: 'src/content/beginner'
    create: true
    slug: '{{slug}}'
    fields:
      - { label: '标题', name: 'title', widget: 'string' }
      - { label: '描述', name: 'description', widget: 'text' }
      - { label: '发布日期', name: 'pubDate', widget: 'datetime', format: 'YYYY-MM-DD', time_format: false }
      - { label: '阅读时长(分钟)', name: 'readTime', widget: 'number', default: 5 }
      - { label: '难度', name: 'difficulty', widget: 'select', options: ['beginner', 'intermediate', 'advanced'] }
      - { label: '排序', name: 'order', widget: 'number', required: false }
      - { label: '封面图片', name: 'image', widget: 'image', required: false }
      - { label: 'SEO标题', name: 'seo_title', widget: 'string', required: false }
      - { label: 'SEO描述', name: 'seo_description', widget: 'text', required: false }
      - { label: '正文', name: 'body', widget: 'markdown' }

  - name: 'facebook-ads'
    label: '📘 Facebook Ads'
    label_singular: '文章'
    folder: 'src/content/facebook-ads'
    create: true
    slug: '{{slug}}'
    fields:
      - { label: '标题', name: 'title', widget: 'string' }
      - { label: '封面图片', name: 'image', widget: 'image', required: false }
      - { label: '正文', name: 'body', widget: 'markdown' }

  - name: 'google-ads'
    label: '🔍 Google Ads'
    label_singular: '文章'
    folder: 'src/content/google-ads'
    create: true
    slug: '{{slug}}'
    fields:
      - { label: '标题', name: 'title', widget: 'string' }
      - { label: '封面图片', name: 'image', widget: 'image', required: false }
      - { label: '正文', name: 'body', widget: 'markdown' }

  - name: 'top-offers'
    label: '💰 TOP Offer'
    label_singular: 'Offer'
    folder: 'src/content/top-offers'
    create: true
    slug: '{{slug}}'
    fields:
      - { label: '标题', name: 'title', widget: 'string' }
      - { label: '封面图片', name: 'image', widget: 'image', required: false }
      - { label: '正文', name: 'body', widget: 'markdown' }

  - name: 'top-networks'
    label: '🏆 TOP联盟'
    label_singular: '联盟'
    folder: 'src/content/top-networks'
    create: true
    slug: '{{slug}}'
    fields:
      - { label: '联盟名称', name: 'title', widget: 'string' }
      - { label: 'Logo图标', name: 'icon', widget: 'image', hint: '上传联盟平台的Logo图片' }
      - { label: '起付金额', name: 'min_payout', widget: 'string', hint: '如 $50' }
      - { label: '支付周期', name: 'payment_frequency', widget: 'string', hint: '如 Net7、Weekly' }
      - { label: '注册链接', name: 'signup_url', widget: 'string' }
      - { label: '描述', name: 'description', widget: 'text', hint: '简短介绍，显示在卡片上' }

  - name: 'celebrities'
    label: '⭐ 名人介绍'
    label_singular: '名人'
    folder: 'src/content/celebrities'
    create: true
    slug: '{{slug}}'
    fields:
      - { label: '姓名', name: 'title', widget: 'string' }
      - { label: '封面图片', name: 'image', widget: 'image', required: false }
      - { label: '正文', name: 'body', widget: 'markdown' }

  - name: 'case-studies'
    label: '📊 实战案例'
    label_singular: '案例'
    folder: 'src/content/case-studies'
    create: true
    slug: '{{slug}}'
    fields:
      - { label: '标题', name: 'title', widget: 'string' }
      - { label: '封面图片', name: 'image', widget: 'image', required: false }
      - { label: '正文', name: 'body', widget: 'markdown' }

  - name: 'tools'
    label: '🛠️ 工具导航'
    label_singular: '工具'
    folder: 'src/content/tools'
    create: true
    slug: '{{slug}}'
    fields:
      - { label: '工具名称', name: 'title', widget: 'string' }
      - { label: '简短描述', name: 'description', widget: 'text' }
      - { label: '分类', name: 'category', widget: 'select', options: ['tracking', 'lp-builder', 'ai', 'creative', 'research', 'spy', 'hosting', 'other'] }
      - { label: '官网链接', name: 'website_url', widget: 'string' }
      - { label: '封面图片', name: 'image', widget: 'image', required: false }
      - { label: '正文', name: 'body', widget: 'markdown' }

  - name: 'landing-page-library'
    label: '📄 LP库'
    label_singular: 'LP'
    folder: 'src/content/landing-page-library'
    create: true
    slug: '{{slug}}'
    fields:
      - { label: '标题', name: 'title', widget: 'string' }
      - { label: '描述', name: 'description', widget: 'text' }
      - { label: 'Offer类型', name: 'offer_type', widget: 'string' }
      - { label: '发布日期', name: 'pubDate', widget: 'datetime', format: 'YYYY-MM-DD', time_format: false }
      - { label: '封面图片', name: 'image', widget: 'image', required: false }
      - { label: 'LP压缩包(.zip)', name: 'download_file', widget: 'file', required: false, hint: '上传LP的ZIP压缩包，用户可在文章页下载' }
      - { label: 'SEO标题', name: 'seo_title', widget: 'string', required: false }
      - { label: 'SEO描述', name: 'seo_description', widget: 'text', required: false }
      - { label: '正文', name: 'body', widget: 'markdown' }
