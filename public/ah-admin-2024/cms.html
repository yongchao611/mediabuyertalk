<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CMS</title></head>
<body>
<script>window.CMS_MANUAL_INIT=true;</script>
<script src="https://unpkg.com/decap-cms@3.13.0/dist/decap-cms.js"></script>
<script>

</html>
