<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>后台登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f6f8;font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
.box{background:#fff;padding:40px;border-radius:12px;box-shadow:0 2px 16px rgba(0,0,0,.08);width:360px;max-width:90vw}
.box h2{margin-bottom:8px;font-size:22px}
.box p{margin-bottom:24px;font-size:14px;color:#999}
.box input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:12px;outline:none}
.box input:focus{border-color:#f66619}
.box button{width:100%;padding:10px;background:#f66619;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}
.box button:hover{background:#e84c0e}
.err{color:#e53e3e;font-size:13px;margin-bottom:8px;display:none}
</style></head>
<body>
<div class="box">
<h2>后台管理</h2>
<p>请输入密码</p>
<p class="err" id="e">密码错误</p>
<input type="password" id="p" placeholder="请输入密码" onkeydown="if(event.key==='Enter')L()" autofocus>
<button type="button" onclick="L()">登 录</button>
</div>
<script>
if(sessionStorage.getItem('a')==='1')location.href='/ah-admin-2024/cms.html';
function L(){if(document.getElementById('p').value==='Simon611'){sessionStorage.setItem('a','1');location.href='/ah-admin-2024/cms.html';}else{document.getElementById('e').style.display='block';}}
</script>
</body>
</html>
